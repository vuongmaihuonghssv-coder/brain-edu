<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ | Mai Hương</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="student-app home-page">
  <div class="petal-field" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <main class="page-shell">
    <nav class="top-nav" aria-label="Menu chính">
      <a href="news.html">Tin tức</a>
      <a href="recruitment.html">Tuyển dụng</a>
      <a href="about.html">Contact</a>
      <a href="#" id="ctrlBrainAccess">🧠 Crt+Brain</a>
      <button class="top-login-button" type="button" id="openHomeLogin">Đăng nhập</button>

      <div class="top-login-popover" id="homeLoginPopover" hidden>
        <div class="welcome-login-head">
          <strong>Đăng nhập học viên</strong>
          <button type="button" id="closeHomeLogin" aria-label="Đóng">×</button>
        </div>
        <form class="welcome-login-card" id="homeLoginForm">
          <label>
            Gmail hoặc tên đăng nhập
            <input type="text" id="homeLoginIdentity" autocomplete="username" placeholder="maihuong hoặc email@gmail.com" required>
          </label>
          <label>
            Password
            <div class="welcome-password-row">
              <input type="password" id="homeLoginPassword" autocomplete="current-password" placeholder="Nhập password" required>
              <button type="button" id="homeTogglePassword">Hiện</button>
            </div>
          </label>
          <button class="welcome-login-submit" type="submit">Đăng nhập</button>
          <div class="welcome-login-links">
            <span>Chưa có tài khoản? <a href="register.html">Đăng ký</a></span>
            <button type="button" id="openHomeRecovery">Quên mật khẩu?</button>
          </div>
          <p class="welcome-login-message" id="homeLoginMessage" role="status"></p>
        </form>

        <section class="welcome-recovery-card" id="homeRecoveryPanel" hidden>
          <div class="welcome-login-head">
            <strong>Lấy lại mật khẩu</strong>
            <span>Nhận mã khôi phục qua email hoặc số điện thoại.</span>
          </div>
          <label>
            Email hoặc số điện thoại
            <input type="text" id="homeRecoveryContact" placeholder="email@gmail.com hoặc 09xxxxxxxx">
          </label>
          <div class="welcome-recovery-actions">
            <a href="forgot-password.html">Mở trang khôi phục</a>
            <button type="button" id="sendHomeRecovery">Gửi mã</button>
          </div>
          <p class="welcome-login-message" id="homeRecoveryMessage" role="status"></p>
        </section>
      </div>
    </nav>

    <section class="welcome-hero" aria-labelledby="welcomeTitle">
      <div class="welcome-orb orb-pink"></div>
      <div class="welcome-orb orb-blue"></div>
      <div class="welcome-bubbles" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="welcome-copy">
        <p class="welcome-kicker">English Learning Center</p>
        <h1 id="welcomeTitle"><span>Welcome</span><small>to Ctrl+Brain</small></h1>
        <p class="welcome-subtitle">Let's continue your English adventure today.</p>
      </div>

      <div class="learning-illustration" aria-label="English learning illustration">
        <svg class="hero-svg" viewBox="0 0 560 460" role="img" aria-labelledby="heroSvgTitle">
          <title id="heroSvgTitle">Floating books, ABC blocks, stars, pencils, vocabulary cards and learning tools</title>
          <defs>
            <linearGradient id="bookGradient" x1="0" x2="1">
              <stop offset="0" stop-color="#7C3AED" />
              <stop offset="1" stop-color="#A855F7" />
            </linearGradient>
            <linearGradient id="pinkOrange" x1="0" x2="1">
              <stop offset="0" stop-color="#FF6B9D" />
              <stop offset="1" stop-color="#FF8E53" />
            </linearGradient>
            <linearGradient id="aquaBlue" x1="0" x2="1">
              <stop offset="0" stop-color="#4FD1C5" />
              <stop offset="1" stop-color="#60A5FA" />
            </linearGradient>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#7C3AED" flood-opacity="0.16" />
            </filter>
          </defs>

          <ellipse cx="286" cy="385" rx="190" ry="38" fill="#7C3AED" opacity="0.08" />

          <g class="float-object float-slow" filter="url(#softShadow)">
            <rect x="178" y="146" width="190" height="150" rx="28" fill="url(#bookGradient)" />
            <rect x="198" y="166" width="150" height="110" rx="20" fill="#fff" opacity="0.92" />
            <path d="M274 166v110" stroke="#D8B4FE" stroke-width="5" stroke-linecap="round" />
            <path d="M220 194h34M220 218h42M294 194h30M294 218h36" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" opacity="0.72" />
          </g>

          <g class="float-object float-delay" transform="translate(62 86)" filter="url(#softShadow)">
            <rect width="78" height="78" rx="20" fill="#F6E05E" />
            <text x="39" y="52" text-anchor="middle" font-size="34" font-weight="800" fill="#351347">A</text>
          </g>

          <g class="float-object float-medium" transform="translate(384 92)" filter="url(#softShadow)">
            <rect width="84" height="68" rx="18" fill="url(#pinkOrange)" />
            <path d="M22 24h40M22 38h32" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.9" />
            <text x="42" y="58" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">VOCAB</text>
          </g>

          <g class="float-object float-slow" transform="translate(84 260)" filter="url(#softShadow)">
            <path d="M18 50h96l-15 38H33z" fill="#60A5FA" />
            <path d="M66 8l58 28-58 28L8 36z" fill="#7C3AED" />
            <path d="M124 36v42" stroke="#FF6B9D" stroke-width="6" stroke-linecap="round" />
          </g>

          <g class="float-object float-delay" transform="translate(394 250)" filter="url(#softShadow)">
            <rect x="0" y="22" width="82" height="52" rx="26" fill="url(#aquaBlue)" />
            <path d="M18 50h46" stroke="#fff" stroke-width="6" stroke-linecap="round" />
            <circle cx="20" cy="18" r="15" fill="#4FD1C5" />
            <circle cx="62" cy="18" r="15" fill="#60A5FA" />
          </g>

          <g class="float-object float-medium" transform="translate(438 180)" filter="url(#softShadow)">
            <path d="M0 22C0 10 10 0 22 0h62c12 0 22 10 22 22v20c0 12-10 22-22 22H49L30 82V64h-8C10 64 0 54 0 42z" fill="#fff" opacity="0.96" />
            <text x="53" y="41" text-anchor="middle" font-size="22" font-weight="800" fill="#7C3AED">Hi!</text>
          </g>

          <g class="float-object float-slow" transform="translate(114 190) rotate(-16)" filter="url(#softShadow)">
            <rect x="0" y="17" width="110" height="20" rx="10" fill="#FF8E53" />
            <path d="M96 17l28 10-28 10z" fill="#F6E05E" />
            <path d="M10 17v20" stroke="#fff" stroke-width="5" opacity="0.7" />
          </g>

          <g class="float-object float-delay" transform="translate(318 314)" filter="url(#softShadow)">
            <rect x="0" y="0" width="78" height="92" rx="22" fill="#fff" opacity="0.95" />
            <path d="M20 28h38M20 46h30M20 64h34" stroke="#A855F7" stroke-width="6" stroke-linecap="round" />
            <text x="39" y="82" text-anchor="middle" font-size="13" font-weight="800" fill="#FF6B9D">WORDS</text>
          </g>

          <g class="sparkle-layer">
            <path d="M470 64l8 18 18 8-18 8-8 18-8-18-18-8 18-8z" fill="#F6E05E" />
            <path d="M72 232l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#4FD1C5" />
            <path d="M330 72l6 14 14 6-14 6-6 14-6-14-14-6 14-6z" fill="#FF6B9D" />
          </g>
        </svg>
      </div>
    </section>
  </main>
  <script src="home.js"></script>
</body>
</html>
