<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu | Mai Hương</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="petal-field" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <main class="page-shell">
    <nav class="top-nav" aria-label="Menu chính">
      <a href="news.html">Tin tức</a>
      <a href="recruitment.html">Tuyển dụng</a>
      <a href="about.html">About me</a>
      <a href="job-management.html">Quản lý</a>
      <a href="teacher.html">Giáo viên</a>
      <a class="active" href="login.html">Đăng nhập</a>
    </nav>

    <section class="auth-layout single-auth" aria-labelledby="forgot-title">
      <div class="section-block auth-panel">
        <p class="section-kicker">Password recovery / Lấy lại mật khẩu</p>
        <h1 id="forgot-title">Quên password?</h1>
        <p>Nếu chưa có token trong đường dẫn, nhập Gmail để hệ thống gửi email khôi phục qua SMTP. Nếu đã mở link từ email, nhập password mới để hoàn tất.</p>

        <form class="auth-form" id="forgotForm">
          <label>
            Gmail đăng ký
            <input type="email" id="recoveryEmail" autocomplete="email" placeholder="maihuong.demo@gmail.com">
          </label>
          <label>
            Password mới, chỉ cần khi mở link khôi phục
            <span class="password-field">
              <input type="password" id="newPassword" autocomplete="new-password" placeholder="Tối thiểu 6 ký tự">
              <button type="button" class="text-button" data-toggle-password="newPassword">Hiện</button>
            </span>
          </label>
          <button class="button primary full-button" type="submit">Tiếp tục khôi phục</button>
          <p class="form-message" id="forgotMessage" role="status"></p>
        </form>
        <a class="button secondary back-login" href="login.html">Quay lại đăng nhập</a>
      </div>
    </section>
  </main>
  <script src="auth.js"></script>
</body>
</html>
