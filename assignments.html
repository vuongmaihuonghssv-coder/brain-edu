<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập | Mai Hương</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="teacher-app">
  <aside class="teacher-sidebar" aria-label="Menu giáo viên">
    <a class="teacher-logo" href="teacher.html"><span class="brain-logo-icon">🧠</span><span>Ctrl+Brain</span></a>
    <div class="role-switch">
      <a href="home.html">Học viên</a>
      <a class="active" href="teacher.html">Giáo viên</a>
    </div>
    <nav class="teacher-menu">
      <a href="teacher.html">Bảng điều khiển</a>
      <p>Soạn & dạy</p>
      <a class="active" href="assignments.html">Bài tập</a>
      <a href="classes.html">Lớp học</a>
      <a href="assign-work.html">Giao bài</a>
      <a href="assigned-work.html">Bài đã giao</a>
    </nav>
    <div class="sidebar-footer">
      <span>○</span>
      <span>◎</span>
      <span>⇥</span>
    </div>
  </aside>

  <main class="teacher-main">
    <header class="teacher-topbar">
      <div class="topbar-actions-left">
        <button type="button" aria-label="Thu gọn menu">☰</button>
        <button type="button" aria-label="Toàn màn hình">⛶</button>
      </div>
      <label class="teacher-search">
        <span class="sr-only">Tìm kiếm</span>
        <input type="search" placeholder="Tìm bộ từ, bài tập, lớp...">
      </label>
      <div class="topbar-actions-right">
        <button type="button" aria-label="Chế độ tối">🌙</button>
        <button type="button" aria-label="Thông báo">🔔</button>
        <span class="plan-badge">FREE</span>
        <button class="user-chip" type="button">N <span>Nguyen Anh Tuấn</span></button>
      </div>
    </header>

    <section class="teacher-dashboard assignment-page">
      <div class="breadcrumb">⌂ Trang chủ <span>/</span> Bài tập</div>

      <section class="assignment-title-card">
        <h1>Danh sách Bài tập</h1>
        <a class="button primary" id="openAssignmentCreator" href="assignment-create.html">+ Tạo bài tập</a>
      </section>

      <section class="assignment-list-card">
        <div class="assignment-toolbar">
          <div class="assignment-tabs" role="tablist" aria-label="Lọc bài tập">
            <button class="active" type="button" data-assignment-tab="all">Tất cả</button>
            <button type="button" data-assignment-tab="draft">Chưa gán</button>
          </div>
          <input type="search" id="assignmentSearch" placeholder="Tìm theo tiêu đề...">
        </div>

        <div id="assignmentListView" class="assignment-table-list"></div>

        <div id="assignmentEmptyState" class="assignment-empty-state">
          <div>□</div>
          <p>Chưa có bài tập nào.</p>
        </div>
      </section>

    </section>
  </main>

  <script src="auth.js"></script>
  <script src="topbar.js"></script>
  <script src="assignments-page.js"></script>
</body>
</html>
